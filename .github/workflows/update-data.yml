name: Update data.json from SharePoint

on:
  repository_dispatch:
    types: [update-data]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write data.json from the dispatch payload
        run: |
          cat > data.json << 'JSONEOF'
          ${{ toJson(github.event.client_payload.facilities) }}
          JSONEOF

      - name: Commit and push if changed
        run: |
          git config user.name "data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update data.json from SharePoint"
          git push
