<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ASEAN Chip Ecosystem Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<style>
  :root{
    --bg:#ffffff; --wash:#faf8ff; --line:#eee7fb; --ink:#2c2540; --muted:#8b83a3;
    --l50:#faf7ff; --l100:#f3eefe; --l200:#e7dcfc; --l400:#b79bf0; --l600:#7c50dc; --l700:#6a3fce;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:"Segoe UI",system-ui,-apple-system,sans-serif;font-size:14px;}
  header{padding:22px 30px 18px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,var(--l50),#fff);}
  header h1{margin:0;font-size:20px;font-weight:650;letter-spacing:-.01em;}
  header p{margin:4px 0 0;color:var(--muted);font-size:13px;}
  .filters{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end;padding:16px 30px;
    border-bottom:1px solid var(--line);background:var(--wash);}
  .field{display:flex;flex-direction:column;gap:5px;}
  .field label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:600;}
  select,input{padding:8px 11px;border:1px solid var(--l200);border-radius:9px;background:#fff;font-size:13px;
    color:var(--ink);min-width:170px;outline:none;transition:border-color .15s,box-shadow .15s;}
  select:focus,input:focus{border-color:var(--l400);box-shadow:0 0 0 3px var(--l100);}
  .count{margin-left:auto;color:var(--muted);font-size:13px;align-self:center;}
  .count b{color:var(--l700);}
  main{display:flex;min-height:0;}
  #mapwrap{flex:1.15;padding:22px 24px;border-right:1px solid var(--line);display:flex;flex-direction:column;}
  #mapwrap h2,#panel h2{font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:600;margin:0 0 10px;}
  #map{flex:1;min-height:460px;position:relative;}
  #map svg{width:100%;height:100%;display:block;}
  .country{fill:#ece5fb;stroke:#fff;stroke-width:1;transition:fill .15s;}
  .country:hover{fill:#e4dbf8;}
  .country.sel{fill:#e0d4f7;stroke:var(--l600);stroke-width:1.4;}
  .bubble{cursor:pointer;}
  .bubble .seg{stroke:#fff;stroke-width:1.5;transition:opacity .15s;}
  .bubble:hover .seg{opacity:.88;}
  .bubble .tot{font-weight:700;fill:var(--ink);text-anchor:middle;pointer-events:none;}
  .bubble .lbl{fill:#5b5273;font-size:10.5px;font-weight:600;text-anchor:middle;pointer-events:none;
    paint-order:stroke;stroke:#fff;stroke-width:2.6px;stroke-linejoin:round;}
  #tip{position:absolute;pointer-events:none;background:#2c2540;color:#fff;padding:8px 11px;border-radius:9px;
    font-size:12px;opacity:0;transition:opacity .12s;transform:translate(-50%,-115%);z-index:5;line-height:1.5;white-space:nowrap;}
  #tip b{font-size:12.5px;}
  #map-legend{display:flex;flex-wrap:wrap;gap:7px 15px;margin-top:14px;font-size:11.5px;color:var(--muted);}
  #map-legend span{display:inline-flex;align-items:center;gap:6px;}
  .dot{width:10px;height:10px;border-radius:50%;display:inline-block;}
  #panel{flex:1;padding:22px 24px;display:flex;flex-direction:column;min-width:0;}
  #list{overflow:auto;flex:1;padding-right:4px;}
  .crow{border:1px solid var(--line);border-radius:11px;margin-bottom:10px;overflow:hidden;background:#fff;}
  .chead{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer;}
  .chead:hover{background:var(--l50);}
  .chead .nm{font-weight:600;}
  .chead .ct{margin-left:auto;color:var(--l700);font-weight:650;font-variant-numeric:tabular-nums;}
  .cbar-track{flex:1;height:7px;border-radius:5px;background:var(--l100);overflow:hidden;max-width:150px;display:flex;}
  .cseg{height:7px;}
  .facs{padding:4px 14px 12px;display:none;}
  .crow.open .facs{display:block;}
  .fac{padding:9px 0;border-top:1px dashed var(--line);}
  .fac:first-child{border-top:none;}
  .fac .fn{font-weight:600;font-size:13px;}
  .fac .fmeta{color:var(--muted);font-size:12px;margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .chip{display:inline-block;font-size:10.5px;padding:1px 8px;border-radius:20px;background:var(--l100);color:var(--l700);}
  .fac a{color:var(--l600);text-decoration:none;font-size:12px;}
  .fac a:hover{text-decoration:underline;}
  footer{padding:12px 30px;border-top:1px solid var(--line);color:var(--muted);font-size:11.5px;background:var(--wash);}
  @media(max-width:820px){main{flex-direction:column;}#mapwrap{border-right:none;border-bottom:1px solid var(--line);}}
</style>
</head>
<body>
<header>
  <h1>ASEAN Chip Ecosystem Tracker</h1>
  <p>Semiconductor facilities across Southeast Asia — count per country, colour-coded by investor origin.</p>
</header>
<div class="filters">
  <div class="field"><label>Segment</label><select id="f-segment"></select></div>
  <div class="field"><label>Investor origin</label><select id="f-economy"></select></div>
  <div class="field"><label>Status</label><select id="f-status"></select></div>
  <div class="field"><label>Search</label><input id="search" placeholder="Facility or parent…" /></div>
  <div class="count" id="count"></div>
</div>
<main>
  <div id="mapwrap">
    <h2>Facilities by country</h2>
    <div id="map"><div id="tip"></div></div>
    <div id="map-legend"></div>
  </div>
  <div id="panel">
    <h2>By country</h2>
    <div id="list"></div>
  </div>
</main>
<footer id="footer"></footer>

3],[114.84,4.39],[114.83,4.35],[114.78,4.28],[114.81,4.27],[114.77,4.17],[114.72,4.1],[114.66,4.04],[114.61,4.02],[114.57,4.05],[114.51,4.11],[114.45,4.2],[114.42,4.26],[114.32,4.26],[114.29,4.3],[114.29,4.35],[114.26,4.41],[114.22,4.48],[114.17,4.53],[114.09,4.56],[114.07,4.59],[114.18,4.59],[114.3,4.61],[114.43,4.66],[114.54,4.72],[114.64,4.8],[114.74,4.88],[114.84,4.95],[114.99,5.02],[115.05,5.02],[115.05,4.96],[115.03,4.9]]]]}}]};
// bubble anchor points (lng,lat) placed on each country's landmass
const ANCHORS = {
  "Brunei":[114.7,4.5],"Cambodia":[104.9,12.5],"Indonesia":[110.0,-7.2],"Laos":[103.8,18.8],
  "Malaysia":[102.2,3.9],"Myanmar":[96.2,21.0],"Philippines":[121.0,14.9],"Singapore":[103.82,1.29],
  "Thailand":[100.9,15.2],"Timor-Leste":[125.7,-8.8],"Vietnam":[107.8,16.2]
};
const ORIGIN = { "US":"#5b6ee1","EU":"#2eb88a","Taiwan":"#e069a4","Japan":"#e0a340",
  "South Korea":"#8b6fd6","China":"#db5c5c","ASEAN":"#3fb5c9","Other":"#9aa0ac" };
const oc = e => ORIGIN[e] || ORIGIN["Other"];
const esc = s => String(s??"").replace(/[&<>"]/g,c=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));

let DATA=[], sel=null, expanded=null, proj;
const F={segment:"",economy:"",status:"",search:""};
const uniq=(a,k)=>[...new Set(a.map(d=>d[k]).filter(Boolean))].sort();
function fillSelect(id,key){
  const s=document.getElementById(id);
  s.innerHTML='<option value="">All</option>'+uniq(DATA,key).map(v=>`<option>${esc(v)}</option>`).join("");
  s.onchange=()=>{F[id.replace("f-","")]=s.value;update();};
}
function filtered(){return DATA.filter(d=>
  (!F.segment||d.segment===F.segment)&&(!F.economy||d.home_economy===F.economy)&&
  (!F.status||d.status===F.status)&&
  (!F.search||(String(d.name)+String(d.ultimate_parent)).toLowerCase().includes(F.search)));}
function countsByCountry(rows){const m={};rows.forEach(d=>m[d.country]=(m[d.country]||0)+1);return m;}
function originBreakdown(facs){const m={};facs.forEach(f=>m[f.home_economy]=(m[f.home_economy]||0)+1);
  return Object.entries(m).map(([origin,value])=>({origin,value})).sort((a,b)=>b.value-a.value);}

const svg=d3.select("#map").append("svg");
const gCountry=svg.append("g"), gBubble=svg.append("g");
const tip=document.getElementById("tip");
const path=d3.geoPath();
const pie=d3.pie().sort(null).value(d=>d.value);

function fit(){
  const el=document.getElementById("map"),w=el.clientWidth,h=el.clientHeight;
  svg.attr("viewBox",`0 0 ${w} ${h}`);
  proj=d3.geoMercator().fitSize([w,h],ASEAN_GEO); path.projection(proj);
  gCountry.selectAll("path").attr("d",path);
}
function drawCountries(){
  gCountry.selectAll("path").data(ASEAN_GEO.features).join("path")
    .attr("class","country")
    .on("click",(ev,d)=>{const n=d.properties.name; setSel(sel===n?null:n);});
  fit();
}
function showTip(ev,b){
  const r=document.getElementById("map").getBoundingClientRect();
  tip.style.left=(ev.clientX-r.left)+"px"; tip.style.top=(ev.clientY-r.top)+"px"; tip.style.opacity=1;
  tip.innerHTML=`<b>${esc(b.country)} — ${b.total}</b><br>`+
    b.parts.map(p=>`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${oc(p.origin)};margin-right:5px"></span>${esc(p.origin)} ${p.value}`).join("<br>");
}
function drawBubbles(rows){
  const cnt=countsByCountry(rows);
  const maxTotal=Math.max(1,...Object.values(cnt));
  const rScale=d3.scaleSqrt().domain([0,maxTotal]).range([17,44]);
  const bdata=Object.keys(cnt).filter(c=>ANCHORS[c]).map(country=>{
    const facs=rows.filter(d=>d.country===country);
    const [x,y]=proj(ANCHORS[country]);
    return {country,total:cnt[country],parts:originBreakdown(facs),x,y,r:rScale(cnt[country])};
  });
  const g=gBubble.selectAll("g.bubble").data(bdata,d=>d.country).join(
    enter=>enter.append("g").attr("class","bubble"), u=>u, ex=>ex.remove());
  g.attr("transform",d=>`translate(${d.x},${d.y})`)
   .classed("selb",d=>d.country===sel)
   .on("mousemove",(ev,d)=>showTip(ev,d))
   .on("mouseleave",()=>tip.style.opacity=0)
   .on("click",(ev,d)=>setSel(sel===d.country?null:d.country));
  g.each(function(d){
    const el=d3.select(this); el.selectAll("*").remove();
    const arc=d3.arc().innerRadius(d.r*0.52).outerRadius(d.r);
    el.selectAll("path.seg").data(pie(d.parts)).join("path")
      .attr("class","seg").attr("d",arc).attr("fill",p=>oc(p.data.origin));
    el.append("circle").attr("r",d.r*0.5).attr("fill","#fff");
    el.append("text").attr("class","tot").attr("dy","0.35em")
      .style("font-size",Math.min(d.r*0.72,22)+"px").text(d.total);
    el.append("text").attr("class","lbl").attr("y",d.r+13).text(d.country);
  });
}
function drawMapData(){ drawBubbles(filtered());
  gCountry.selectAll("path").classed("sel",d=>d.properties.name===sel); }

function renderPanel(){
  const rows=filtered(),cnt=countsByCountry(rows);
  const max=Math.max(1,...Object.values(cnt));
  const countries=Object.keys(cnt).sort((a,b)=>cnt[b]-cnt[a]);
  const list=document.getElementById("list"); list.innerHTML="";
  if(!countries.length){list.innerHTML=`<p style="color:var(--muted)">No facilities match these filters.</p>`;return;}
  countries.forEach(country=>{
    const facs=rows.filter(d=>d.country===country);
    const open=(expanded===country)||(sel===country);
    const parts=originBreakdown(facs);
    const segHtml=parts.map(p=>`<div class="cseg" style="width:${100*p.value/cnt[country]}%;background:${oc(p.origin)}"></div>`).join("");
    const row=document.createElement("div"); row.className="crow"+(open?" open":"");
    row.innerHTML=`
      <div class="chead">
        <span class="nm">${esc(country)}</span>
        <div class="cbar-track">${segHtml}</div>
        <span class="ct">${cnt[country]}</span>
      </div>
      <div class="facs">${facs.map(f=>`
        <div class="fac">
          <div class="fn">${esc(f.name)}</div>
          <div class="fmeta"><span class="dot" style="background:${oc(f.home_economy)}"></span>${esc(f.ultimate_parent)} · ${esc(f.home_economy)}</div>
          <div class="fmeta"><span class="chip">${esc(f.segment)}</span><span class="chip">${esc(f.status)}</span><span>${esc(f.city)}</span>${f.sources?` · <a href="${esc(f.sources)}" target="_blank" rel="noopener">source</a>`:""}</div>
        </div>`).join("")}</div>`;
    row.querySelector(".chead").onclick=()=>{const willOpen=!open; expanded=willOpen?country:null; sel=willOpen?country:null; update();};
    list.appendChild(row);
  });
}
function renderLegend(){
  document.getElementById("map-legend").innerHTML=
    "<span style='font-weight:600;color:#6a3fce'>Investor origin:</span>"+
    uniq(DATA,"home_economy").map(e=>`<span><span class="dot" style="background:${oc(e)}"></span>${esc(e)}</span>`).join("");
}
function setSel(n){sel=n;expanded=n;update();
  if(n){const el=[...document.querySelectorAll(".crow")].find(r=>r.querySelector(".nm").textContent===n); if(el) el.scrollIntoView({behavior:"smooth",block:"nearest"});}}
function update(){
  document.getElementById("count").innerHTML=`<b>${filtered().length}</b> of ${DATA.length} facilities`;
  drawMapData(); renderPanel();
}
fetch("data.json").then(r=>r.json()).then(data=>{
  DATA=data;
  fillSelect("f-segment","segment"); fillSelect("f-economy","home_economy"); fillSelect("f-status","status");
  document.getElementById("search").oninput=e=>{F.search=e.target.value.toLowerCase().trim();update();};
  renderLegend(); drawCountries(); update();
  document.getElementById("footer").textContent=
    `${DATA.length} facilities across ${uniq(DATA,"country").length} ASEAN countries · bubble size = facility count · colours = investor origin · manually maintained · loaded ${new Date().toISOString().slice(0,10)}`;
}).catch(err=>{document.getElementById("list").innerHTML=
  `<p style="color:#b4436b">Could not load data.json. If previewing locally, run a local server rather than opening the file directly.</p>`;console.error(err);});
window.addEventListener("resize",()=>{fit();drawBubbles(filtered());});
</script>
